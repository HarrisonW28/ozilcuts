services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ozilcuts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    volumes:
      - ozilcuts-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ozilcuts"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  ozilcuts-pgdata:
